# ─────────────────────────────────────────────
# Servidor y Rutas (Configuración Crítica Alwaysdata)
# ─────────────────────────────────────────────
server.port=${PORT:9000}
server.address=::
server.servlet.context-path=/api

# ─────────────────────────────────────────────
# PostgreSQL Configuration
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-className=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.servlet.session.timeout=30m

# ─────────────────────────────────────────────
# Almacenamiento de archivos (Ruta Absoluta)
# ─────────────────────────────────────────────
file.upload-dir=${UPLOAD_DIR:/home/sergiocd/uploads}

# Límites de tamaño para subida de archivos
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ─────────────────────────────────────────────
# Configuración de Seguridad y Aplicación
# ─────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:https://sergiocd.alwaysdata.net}

# Configuración de JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION:604800000}